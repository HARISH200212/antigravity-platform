services:
  # ─── NestJS API ─────────────────────────────────────────────────────────────
  - type: web
    name: agt-api
    runtime: node
    rootDir: apps/api
    buildCommand: npm install && npm run build
    startCommand: node dist/main.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: JWT_SECRET
        generateValue: true
      - key: ML_SERVICE_URL
        fromService:
          name: agt-ml-service
          type: web
          property: host
      - key: DATABASE_URL
        fromDatabase:
          name: agt-postgres
          property: connectionString
    healthCheckPath: /healthz
    plan: free

  # ─── Python ML Service ───────────────────────────────────────────────────────
  - type: web
    name: agt-ml-service
    runtime: python
    rootDir: apps/ml-service
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ENVIRONMENT
        value: production
    healthCheckPath: /health
    plan: free

databases:
  - name: agt-postgres
    plan: free
    databaseName: antigravity
    user: agt
